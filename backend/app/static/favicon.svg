<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="55%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="inner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- badge -->
  <rect width="64" height="64" rx="18" fill="url(#g)"/>
  <rect width="64" height="64" rx="18" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- inbox tray -->
  <path d="M14 30 L22 30 L26 36 L38 36 L42 30 L50 30 L50 46 A4 4 0 0 1 46 50 L18 50 A4 4 0 0 1 14 46 Z"
        fill="url(#inner)"/>
  <path d="M14 30 L22 30 L26 36 L38 36 L42 30 L50 30"
        fill="none" stroke="#4338ca" stroke-width="1.5" stroke-opacity="0.25"/>

  <!-- incoming arrow into tray -->
  <path d="M32 14 L32 29" stroke="#0f172a" stroke-width="4" stroke-linecap="round"/>
  <path d="M25 22 L32 29 L39 22" fill="none" stroke="#0f172a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- verified checkmark, offset bottom-right -->
  <circle cx="47" cy="47" r="11" fill="#0f172a"/>
  <circle cx="47" cy="47" r="11" fill="none" stroke="url(#g)" stroke-width="1.5"/>
  <path d="M42 47 L45.5 50.5 L52 43.5" fill="none" stroke="#a5f3fc" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
