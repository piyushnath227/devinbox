<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ app_name }}{% endblock %} - DevInbox</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/tailwind.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body class="bg-surface-950 text-gray-100 min-h-screen font-sans">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-surface-900 border-r border-gray-800 flex flex-col">
            <div class="flex items-center gap-3 px-6 py-5 border-b border-gray-800">
                <div class="w-9 h-9 bg-primary-600 rounded-lg flex items-center justify-center"><i data-lucide="bot" class="w-5 h-5 text-white"></i></div>
                <div>
                    <h1 class="text-lg font-bold text-white">{{ app_name }}</h1>
                    <p class="text-xs text-gray-500">AI Autopilot Agent</p>
                </div>
            </div>
            <nav class="flex-1 px-3 py-4 space-y-1">
                <a href="/dashboard/" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium {% if current_page=='overview' %}bg-primary-600/20 text-primary-400{% else %}text-gray-400 hover:text-white hover:bg-surface-800{% endif %}"><i data-lucide="layout-dashboard" class="w-4 h-4"></i> Overview</a>
                <a href="/dashboard/keys" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium {% if current_page=='keys' %}bg-primary-600/20 text-primary-400{% else %}text-gray-400 hover:text-white hover:bg-surface-800{% endif %}"><i data-lucide="key-round" class="w-4 h-4"></i> API Keys</a>
                <a href="/dashboard/activity" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium {% if current_page=='activity' %}bg-primary-600/20 text-primary-400{% else %}text-gray-400 hover:text-white hover:bg-surface-800{% endif %}"><i data-lucide="list-checks" class="w-4 h-4"></i> Activity Log</a>
                <a href="/dashboard/test" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium {% if current_page=='test' %}bg-primary-600/20 text-primary-400{% else %}text-gray-400 hover:text-white hover:bg-surface-800{% endif %}"><i data-lucide="flask-conical" class="w-4 h-4"></i> Test Agent</a>
            </nav>
            <div class="px-4 py-4 border-t border-gray-800">
                <div class="flex items-center gap-2 text-xs text-gray-500">
                    <span class="inline-block w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> System Online
                </div>
                <a href="/dashboard/api/logout" class="mt-3 flex items-center gap-1.5 text-xs text-gray-500 hover:text-gray-300"><i data-lucide="log-out" class="w-3.5 h-3.5"></i> Logout</a>
            </div>
        </aside>
        <main class="flex-1 overflow-y-auto">
            <div class="p-6 lg:p-8 max-w-7xl mx-auto">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 space-y-2"></div>
    <script>
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const styles = { success:'bg-green-600', error:'bg-red-600', warning:'bg-yellow-600', info:'bg-primary-600' };
            const toast = document.createElement('div');
            toast.className = `${styles[type]||styles.info} text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-2 min-w-[280px]`;
            toast.innerHTML = `<span class="flex-1 text-sm">${message}</span><button onclick="this.parentElement.remove()">✕</button>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }
        async function apiRequest(url, options = {}) {
            const response = await fetch(url, { headers: {'Content-Type':'application/json', ...options.headers}, ...options });
            const data = await response.json();
            if (!response.ok) throw new Error(data.message || `Request failed (${response.status})`);
            return data;
        }
    </script>
    {% block scripts %}{% endblock %}
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
